# ==========================================
# CGI-242 — Docker Compose Production
# ==========================================

services:
  # --- Backend API ---
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: cgi242-api
    restart: unless-stopped
    env_file: ./server/.env.production
    environment:
      - PORT=3003
      - DATABASE_URL=postgresql://cgi242:${POSTGRES_PASSWORD}@postgres:5432/cgi242?schema=public
      - QDRANT_URL=http://qdrant:6333
    ports:
      - "3003:3003"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - cgi242-net

  # --- PostgreSQL ---
  postgres:
    image: postgres:16-alpine
    container_name: cgi242-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cgi242
      POSTGRES_USER: cgi242
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cgi242"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cgi242-net

  # --- Qdrant (base vectorielle) ---
  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: cgi242-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - cgi242-net

  # --- Nginx reverse proxy + HTTPS ---
  nginx:
    image: nginx:alpine
    container_name: cgi242-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_data:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - api
    networks:
      - cgi242-net

  # --- Certbot (HTTPS Let's Encrypt) ---
  certbot:
    image: certbot/certbot
    container_name: cgi242-certbot
    volumes:
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew; done'"
    networks:
      - cgi242-net

volumes:
  pgdata:
  qdrant_data:
  certbot_data:
  certbot_www:

networks:
  cgi242-net:
    driver: bridge
