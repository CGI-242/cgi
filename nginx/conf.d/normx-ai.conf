# NormX AI — normx-ai.com (Landing page)

# Redirection HTTP -> HTTPS
server {
    listen 80;
    server_name normx-ai.com www.normx-ai.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name normx-ai.com www.normx-ai.com;

    ssl_certificate /etc/letsencrypt/live/normx-ai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/normx-ai.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:NormxSSL:5m;
    ssl_session_tickets off;

    root /var/www/normx-ai;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
}
