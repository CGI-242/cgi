# Étape 1 : HTTP uniquement (pour obtenir le certificat SSL)
# Après certbot, remplacer par la version HTTPS ci-dessous

server {
    listen 80;
    server_name api.cgi242.normx.ai;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Rediriger tout le reste vers HTTPS (activer après certbot)
    # location / {
    #     return 301 https://$host$request_uri;
    # }

    # Proxy vers le backend (temporaire, avant HTTPS)
    location / {
        limit_req zone=api burst=50 nodelay;

        proxy_pass http://api:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

