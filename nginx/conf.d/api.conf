# Redirection HTTP -> HTTPS
server {
    listen 80;
    server_name cgi242.normx-ai.com;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Tout le reste -> HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name cgi242.normx-ai.com;

    ssl_certificate /etc/letsencrypt/live/cgi242.normx-ai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cgi242.normx-ai.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; connect-src 'self' https:; frame-src https://challenges.cloudflare.com; font-src 'self' data: https://fonts.gstatic.com" always;

    root /var/www/cgi242;
    index index.html;

    # Proxy API vers le backend
    location /api {
        limit_req zone=api burst=50 nodelay;

        proxy_pass http://api:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Swagger / docs API
    location /docs {
        proxy_pass http://api:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Health check backend
    location /health {
        proxy_pass http://api:3003;
    }

    # Frontend statique (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache des assets statiques
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
